<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mônica - Feito com carinho</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white overflow-hidden">

    <!-- Melancia -->
    <img
        src="./assets/melancia.png"
        alt="Melancia"
        class="watermelon"
    >

    <!-- Conteúdo -->
    <main class="h-screen flex flex-col items-center justify-center">

        <h1 class="title text-center text-2xl md:text-4xl font-light">
            Feito com carinho,<br>
            para ficar além da memória.
        </h1>

        <button
            id="startBtn"
            class="
                mt-10
                bg-red-700
                hover:bg-red-600
                px-16
                py-4
                rounded-xl
                transition-all
                duration-300
                hover:scale-105
                shadow-lg
                shadow-red-700/40
            "
        >
            Clique para iniciar
        </button>

    </main>

    <!-- Rodapé -->
    <footer class="footer">
        Destinado à Mônica Nascimento de Vasconcelos
    </footer>

    <script src="script.js"></script>

</body>
</html>
